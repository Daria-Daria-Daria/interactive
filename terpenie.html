<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Терпение лопается</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #faf8f5 0%, #f5f0e8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            padding: 1rem;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 2px;
            color: #5a4e42;
            margin-bottom: 3rem;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            padding-bottom: 1rem;
        }

        .patience-word {
            display: inline-block;
            font-size: 5rem;
            font-weight: 350;
            color: #2e2e2e;
            background: rgba(255, 255, 255, 0.7);
            padding: 1rem 3rem;
            border-radius: 120px;
            box-shadow: 0 25px 40px -15px rgba(0,0,0,0.1);
            border: 2px solid rgba(212, 175, 55, 0.3);
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 3rem;
            backdrop-filter: blur(5px);
            position: relative;
            user-select: none;
        }

        .patience-word:hover {
            transform: scale(1.02);
            border-color: #D4AF37;
            box-shadow: 0 30px 50px -15px rgba(212, 175, 55, 0.4);
        }

        .patience-word:active {
            transform: scale(0.98);
        }

        .patience-word.exploded {
            animation: pop 0.4s cubic-bezier(0.2, 0.9, 0.3, 1.3) forwards;
            pointer-events: none;
            opacity: 0;
        }

        @keyframes pop {
            0% { transform: scale(1); opacity: 1; }
            30% { transform: scale(1.2); opacity: 0.9; }
            60% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(0); opacity: 0; }
        }

        .reset-btn {
            background: transparent;
            border: 2px solid #D4AF37;
            color: #2e2e2e;
            font-size: 1.2rem;
            padding: 0.8rem 2.5rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 350;
            letter-spacing: 1px;
            margin-top: 2rem;
            backdrop-filter: blur(4px);
            background: rgba(255, 255, 255, 0.4);
        }

        .reset-btn:hover {
            background: #D4AF37;
            color: white;
            box-shadow: 0 10px 25px -5px rgba(212, 175, 55, 0.5);
            transform: translateY(-3px);
        }

        .reset-btn:active {
            transform: translateY(0);
        }

        .message {
            font-size: 1.5rem;
            color: #D4AF37;
            margin-top: 2rem;
            font-weight: 300;
            min-height: 4rem;
            opacity: 0.8;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }

        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #D4AF37;
            border-radius: 50%;
            opacity: 0.8;
            animation: fly 1s ease-out forwards;
        }

        @keyframes fly {
            0% { transform: translate(0, 0) scale(1); opacity: 0.8; }
            100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✦ испытай терпение ✦</h1>
        
        <div class="patience-word" id="patienceWord">
            терпение
        </div>

        <div class="message" id="message"></div>

        <button class="reset-btn" id="resetBtn">вернуть терпение</button>
    </div>

    <div class="particles" id="particles"></div>

    <script>
        const patienceWord = document.getElementById('patienceWord');
        const message = document.getElementById('message');
        const resetBtn = document.getElementById('resetBtn');
        const particlesContainer = document.getElementById('particles');

        function createExplosion(x, y) {
            const particleCount = 30;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                const angle = (i / particleCount) * Math.PI * 2 + Math.random() * 0.5;
                const distance = 50 + Math.random() * 100;
                const dx = Math.cos(angle) * distance;
                const dy = Math.sin(angle) * distance;
                
                particle.style.setProperty('--dx', dx + 'px');
                particle.style.setProperty('--dy', dy + 'px');
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                
                particle.style.background = `hsl(${45 + Math.random() * 20}, 70%, 55%)`;
                particle.style.width = Math.random() * 12 + 4 + 'px';
                particle.style.height = particle.style.width;
                
                particlesContainer.appendChild(particle);
                
                setTimeout(() => {
                    particle.remove();
                }, 1000);
            }
        }

        patienceWord.addEventListener('click', function(e) {
            if (patienceWord.classList.contains('exploded')) return;
            
            const rect = patienceWord.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;
            
            patienceWord.classList.add('exploded');
            createExplosion(x, y);
            
            message.innerHTML = '💥 терпение лопнуло... 💥';
            
            setTimeout(() => {
                message.innerHTML = '¯\\_(ツ)_/¯';
            }, 2000);
        });

        resetBtn.addEventListener('click', function() {
            patienceWord.classList.remove('exploded');
            message.innerHTML = '';
            
            // маленький эффект при появлении
            patienceWord.style.transform = 'scale(0)';
            patienceWord.style.opacity = '0';
            
            setTimeout(() => {
                patienceWord.style.transform = '';
                patienceWord.style.opacity = '';
            }, 50);
        });

        // очищаем частицы если вдруг остались
        setInterval(() => {
            if (particlesContainer.children.length > 100) {
                particlesContainer.innerHTML = '';
            }
        }, 2000);
    </script>
</body>
</html>
